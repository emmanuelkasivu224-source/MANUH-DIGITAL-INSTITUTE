<!DOCTYPE html>

<style>
/* MENU BUTTON */
.menu-btn {

}

header {

}

.container {

}

input {

}

button {
    padding: 10px 15px;
    background: #38ada9;
    color: white;
    border: none;

}

table {

<script>
function toggleMenu(){
    let menu = document.getElementById("sideMenu");

}
